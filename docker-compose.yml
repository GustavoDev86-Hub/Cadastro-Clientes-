version: '3.8'

services:
  app:
    build: .
    container_name: php_crud_app
    ports:
      - "8083:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: mariadb_crud
    restart: always
    environment:
      MARIADB_DATABASE: sistema_clientes
      MARIADB_USER: gusta_dev
      MARIADB_PASSWORD: "123456"
      MARIADB_ROOT_PASSWORD: "root_password"
    ports:
      - "3306:3306"